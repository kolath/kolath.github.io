<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Designers — Curated</title>
    <meta name="description" content="A curated list of exceptional product and UI/UX designers worth following." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface-2: #1a1a1a;
        --border: rgba(255,255,255,0.07);
        --border-hover: rgba(255,255,255,0.14);
        --text-primary: #efefef;
        --text-secondary: #888;
        --text-muted: #4a4a4a;
        --accent: #d4f754;
        --tag-bg: rgba(255,255,255,0.05);
        --tag-text: #777;
        --label-bg: rgba(130,180,255,0.07);
        --label-border: rgba(130,180,255,0.2);
        --label-text: #8ab4e8;
        --rec-bg: rgba(212,247,84,0.05);
        --rec-border: rgba(212,247,84,0.15);
        --rec-text: #bcd85a;
        --transition: 180ms cubic-bezier(0.2, 0, 0, 1);
      }

      html { font-size: 15px; }

      body {
        background: var(--bg);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px 80px;
      }

      /* ── HEADER ── */
      .header { padding: 64px 0 40px; }

      .header__eyebrow {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 14px;
      }

      .header__title {
        font-size: clamp(1.6rem, 3.5vw, 2.25rem);
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 1.15;
        margin-bottom: 10px;
      }

      .header__desc {
        font-size: 0.9rem;
        color: var(--text-secondary);
        line-height: 1.65;
        max-width: 440px;
      }

      /* ── TOOLBAR ── */
      .toolbar {
        padding: 24px 0 0;
        border-top: 1px solid var(--border);
        margin-top: 32px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .toolbar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .toolbar-label {
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        flex-shrink: 0;
        width: 52px;
      }

      .search-wrap {
        flex: 1;
        min-width: 180px;
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
      }

      .search {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 11px 8px 32px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.825rem;
        outline: none;
        transition: border-color var(--transition);
      }

      .search::placeholder { color: var(--text-muted); }
      .search:focus { border-color: var(--border-hover); }

      /* ── FILTER CHIPS ── */
      .filter-group {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        align-items: center;
      }

      /* category filters — plain style */
      .filter-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 4px 12px;
        font-size: 0.73rem;
        font-family: inherit;
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }

      .filter-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }

      .filter-btn.is-active {
        background: var(--accent);
        border-color: var(--accent);
        color: #111;
        font-weight: 500;
      }

      /* label filters — blue tint to match label pills */
      .label-btn {
        background: transparent;
        border: 1px solid var(--label-border);
        border-radius: 100px;
        padding: 4px 12px;
        font-size: 0.73rem;
        font-family: inherit;
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }

      .label-btn:hover { color: var(--label-text); border-color: rgba(130,180,255,0.35); }

      .label-btn.is-active {
        background: var(--label-bg);
        border-color: var(--label-border);
        color: var(--label-text);
        font-weight: 500;
      }

      /* ── CATEGORY SECTION ── */
      .category-section { margin-top: 40px; }

      .category-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 0 14px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
      }

      .category-title {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .category-count {
        font-size: 0.68rem;
        color: var(--text-muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 1px 8px;
      }

      /* ── DESIGNER ROW ── */
      .designer-list { list-style: none; }

      .designer-item { border-bottom: 1px solid var(--border); }

      /* grid lives on the row div, not the link */
      .designer-row {
        display: grid;
        grid-template-columns: 26px 76px 1fr auto 28px;
        gap: 14px;
        align-items: center;
        padding: 4px 8px;
        border-radius: 8px;
        margin: 0 -8px;
        transition: background var(--transition);
        position: relative;
      }

      .designer-row:hover { background: var(--surface); }

      /* the portfolio link spans the first 3 content columns */
      .row-link {
        display: contents; /* participates in parent grid without creating a box */
        text-decoration: none;
        color: inherit;
      }

      /* make the three columns in row-link actually clickable */
      .row-link .item-index,
      .row-link .item-thumb-wrap,
      .row-link .item-info {
        cursor: pointer;
        padding: 8px 0;
      }

      .item-index {
        font-size: 0.68rem;
        font-variant-numeric: tabular-nums;
        color: var(--text-muted);
        text-align: right;
        font-weight: 500;
        flex-shrink: 0;
      }

      .item-thumb-wrap {
        width: 76px;
        height: 50px;
        border-radius: 6px;
        overflow: hidden;
        background: var(--surface-2);
        border: 1px solid var(--border);
        flex-shrink: 0;
      }

      .item-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top left;
        filter: grayscale(0.2);
        opacity: 0.8;
        transition: all var(--transition);
      }

      .designer-row:hover .item-thumb { filter: grayscale(0); opacity: 1; }

      .designer-row:hover .item-arrow { color: var(--text-secondary); transform: translateX(2px); }

      .item-thumb-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 1rem;
        background: linear-gradient(135deg, #161616, #1e1e1e);
      }

      .item-name {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 2px;
      }

      .item-subtitle {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      /* tags row: specialties + labels together */
      .item-tags {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        align-items: center;
      }

      /* specialty tag — grey, no border */
      .item-tag {
        font-size: 0.65rem;
        background: var(--tag-bg);
        color: var(--tag-text);
        border-radius: 4px;
        padding: 2px 6px;
        white-space: nowrap;
      }

      /* label pill — blue tint, with dot */
      .item-label {
        font-size: 0.65rem;
        background: var(--label-bg);
        color: var(--label-text);
        border: 1px solid var(--label-border);
        border-radius: 100px;
        padding: 1px 7px 1px 5px;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .item-label::before {
        content: '';
        width: 4px;
        height: 4px;
        background: var(--label-text);
        border-radius: 50%;
        opacity: 0.6;
        flex-shrink: 0;
      }

      /* actions group (rec + x link) */
      .item-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      /* X link icon */
      .x-link {
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        text-decoration: none;
        transition: all var(--transition);
        flex-shrink: 0;
      }

      .x-link:hover {
        border-color: var(--border-hover);
        color: var(--text-secondary);
        background: var(--surface-2);
      }

      /* rec trigger */
      .rec-trigger {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 9px;
        background: var(--rec-bg);
        border: 1px solid var(--rec-border);
        border-radius: 100px;
        font-size: 0.68rem;
        color: var(--rec-text);
        cursor: pointer;
        font-family: inherit;
        transition: all var(--transition);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .rec-trigger:hover { background: rgba(212,247,84,0.12); border-color: rgba(212,247,84,0.25); }
      .rec-trigger.is-open { background: rgba(212,247,84,0.12); }
      .rec-trigger svg { transition: transform var(--transition); flex-shrink: 0; }
      .rec-trigger.is-open svg { transform: rotate(180deg); }

      .item-arrow {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        flex-shrink: 0;
        transition: all var(--transition);
        pointer-events: none;
      }

      /* ── RECOMMENDATION PANEL ── */
      .rec-panel {
        display: none;
        margin: 0 8px 12px;
        padding: 14px 16px;
        background: var(--rec-bg);
        border: 1px solid var(--rec-border);
        border-radius: 8px;
      }

      .rec-panel.is-open { display: block; }

      .rec-panel__label {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
        opacity: 0.7;
      }

      .rec-panel__text {
        font-size: 0.825rem;
        line-height: 1.65;
        color: #c8d8a0;
        font-style: italic;
      }

      /* ── MISC ── */
      .empty {
        padding: 56px 0;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.825rem;
        display: none;
      }
      .empty.is-visible { display: block; }

      .stats-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 0 0;
        font-size: 0.75rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        margin-top: 40px;
      }

      .stats-bar a { color: var(--text-muted); text-decoration: none; }
      .stats-bar a:hover { color: var(--text-secondary); }

      .loading {
        padding: 48px 0;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      @media (max-width: 580px) {
        .designer-row { grid-template-columns: 20px 60px 1fr 22px; gap: 10px; }
        .item-thumb-wrap { width: 60px; height: 40px; }
        .rec-trigger { display: none; }
        .toolbar-label { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="page">

      <header class="header">
        <p class="header__eyebrow">Curated</p>
        <h1 class="header__title">Product Designers Worth Following</h1>
        <p class="header__desc">精选 product 和 UI/UX 设计师，附上从 offer 角度来看这份作品集好在哪里。</p>
      </header>

      <div class="toolbar">
        <!-- search -->
        <div class="toolbar-row">
          <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
              <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input class="search" id="search" type="search" placeholder="Search by name, company, specialty, label…" autocomplete="off" />
          </div>
        </div>
        <!-- role filter -->
        <div class="toolbar-row">
          <span class="toolbar-label">Role</span>
          <div class="filter-group" id="cat-filters">
            <button class="filter-btn is-active" data-filter="all">All</button>
          </div>
        </div>
        <!-- label filter -->
        <div class="toolbar-row" id="label-row">
          <span class="toolbar-label">Label</span>
          <div class="filter-group" id="label-filters"></div>
        </div>
      </div>

      <div id="loading" class="loading">Loading…</div>
      <div id="content"></div>
      <div class="empty" id="empty">No designers match your search.</div>

      <div class="stats-bar">
        <span id="count-label"></span>
        <a href="./index.html">← Portfolio</a>
      </div>

    </div>

    <script>
      const THUMB = 'https://image.thum.io/get/width/320/crop/420/noanimate/';

      const CATEGORY_ORDER = [
        'Product Designer', 'Design Engineer', 'Design Systems',
        'UX Researcher', 'Brand Designer', 'Other',
      ];

      // Common labels — sorted by relevance for product designers
      const LABEL_ORDER = [
        'AI', 'Autonomous', 'Fintech', 'Dev Tools', 'Productivity',
        'B2B', 'B2C', 'Enterprise', 'Consumer', 'Healthcare',
        'Creator Tools', 'No-Code', 'Open Source', 'Infrastructure', 'Social',
      ];

      let all = [];
      let activeCategory = 'all';
      let activeLabel = 'all';

      async function init() {
        try {
          const res = await fetch('./designers.json');
          all = await res.json();
        } catch { all = []; }
        document.getElementById('loading').style.display = 'none';
        buildCategoryFilters();
        buildLabelFilters();
        render();
        document.getElementById('search').addEventListener('input', render);
      }

      function buildCategoryFilters() {
        const cats = [...new Set(all.map(d => d.category).filter(Boolean))];
        const ordered = CATEGORY_ORDER.filter(c => cats.includes(c));
        const rest = cats.filter(c => !CATEGORY_ORDER.includes(c));
        const container = document.getElementById('cat-filters');
        container.querySelector('[data-filter="all"]').addEventListener('click', () => setCat('all'));
        [...ordered, ...rest].forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.dataset.filter = cat;
          btn.textContent = cat;
          btn.addEventListener('click', () => setCat(cat));
          container.appendChild(btn);
        });
      }

      function buildLabelFilters() {
        const allLabels = all.flatMap(d => d.labels || []);
        const counts = {};
        allLabels.forEach(l => counts[l] = (counts[l] || 0) + 1);
        const ordered = LABEL_ORDER.filter(l => counts[l]);
        const rest = Object.keys(counts).filter(l => !LABEL_ORDER.includes(l)).sort();

        const container = document.getElementById('label-filters');
        const labelRow = document.getElementById('label-row');

        if (ordered.length + rest.length === 0) {
          labelRow.style.display = 'none';
          return;
        }

        [...ordered, ...rest].forEach(label => {
          const btn = document.createElement('button');
          btn.className = 'label-btn';
          btn.dataset.label = label;
          btn.textContent = label;
          btn.addEventListener('click', () => setLabel(label));
          container.appendChild(btn);
        });
      }

      function setCat(f) {
        activeCategory = f;
        document.querySelectorAll('.filter-btn').forEach(b =>
          b.classList.toggle('is-active', b.dataset.filter === f)
        );
        render();
      }

      function setLabel(l) {
        activeLabel = activeLabel === l ? 'all' : l;
        document.querySelectorAll('.label-btn').forEach(b =>
          b.classList.toggle('is-active', b.dataset.label === activeLabel)
        );
        render();
      }

      function render() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        let list = all;

        if (activeCategory !== 'all') {
          list = list.filter(d => d.category === activeCategory);
        }

        if (activeLabel !== 'all') {
          list = list.filter(d => d.labels?.includes(activeLabel));
        }

        if (q) {
          list = list.filter(d =>
            d.name.toLowerCase().includes(q) ||
            d.title?.toLowerCase().includes(q) ||
            d.company?.toLowerCase().includes(q) ||
            d.category?.toLowerCase().includes(q) ||
            d.specialties?.some(s => s.toLowerCase().includes(q)) ||
            d.labels?.some(l => l.toLowerCase().includes(q))
          );
        }

        const content = document.getElementById('content');
        const empty = document.getElementById('empty');

        if (list.length === 0) {
          content.innerHTML = '';
          empty.classList.add('is-visible');
          document.getElementById('count-label').textContent = '0 designers';
          return;
        }

        empty.classList.remove('is-visible');

        // Group by category
        const groups = {};
        list.forEach(d => {
          const cat = d.category || 'Other';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(d);
        });

        const orderedKeys = CATEGORY_ORDER.filter(c => groups[c]);
        const restKeys = Object.keys(groups).filter(c => !CATEGORY_ORDER.includes(c));

        let idx = 1;
        const html = [...orderedKeys, ...restKeys].map(cat => {
          const items = groups[cat];
          const rows = items.map(d => designerRow(d, idx++)).join('');
          return `
            <section class="category-section">
              <div class="category-header">
                <span class="category-title">${cat}</span>
                <span class="category-count">${items.length}</span>
              </div>
              <ul class="designer-list">${rows}</ul>
            </section>`;
        }).join('');

        content.innerHTML = html;

        // Bind rec toggles
        content.querySelectorAll('.rec-trigger').forEach(btn => {
          btn.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            const id = btn.dataset.id;
            const panel = document.getElementById(`rec-${id}`);
            const isOpen = panel.classList.contains('is-open');
            content.querySelectorAll('.rec-panel.is-open').forEach(p => p.classList.remove('is-open'));
            content.querySelectorAll('.rec-trigger.is-open').forEach(b => b.classList.remove('is-open'));
            if (!isOpen) { panel.classList.add('is-open'); btn.classList.add('is-open'); }
          });
        });

        document.getElementById('count-label').textContent =
          list.length === all.length ? `${all.length} designers` : `${list.length} of ${all.length}`;
      }

      function designerRow(d, idx) {
        const thumbUrl = d.url ? `${THUMB}${d.url}` : '';
        const subtitle = [d.title, d.company].filter(Boolean).join(' · ');

        const thumb = thumbUrl
          ? `<img class="item-thumb" src="${thumbUrl}" alt="${d.name}" loading="lazy"
               onerror="this.outerHTML='<div class=item-thumb-placeholder>✦</div>'" />`
          : `<div class="item-thumb-placeholder">✦</div>`;

        const specialtyTags = (d.specialties || [])
          .map(s => `<span class="item-tag">${s}</span>`).join('');

        const labelPills = (d.labels || [])
          .map(l => `<span class="item-label">${l}</span>`).join('');

        const recBtn = d.recommendation ? `
          <button class="rec-trigger" data-id="${d.id}" aria-label="Why this portfolio is good">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Why good
          </button>` : '';

        const xBtn = d.twitter ? `
          <a class="x-link" href="https://x.com/${d.twitter}" target="_blank" rel="noopener noreferrer"
             aria-label="${d.name} on X" title="@${d.twitter} on X">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M12.6 1h2.3L9.8 6.8 16 15h-4.3l-3.7-4.9L3.5 15H1.2l5.5-6.2L0 1h4.4l3.4 4.4L12.6 1zm-.8 12.6h1.3L4.2 2.4H2.8l9 11.2z"/>
            </svg>
          </a>` : '';

        const recPanel = d.recommendation ? `
          <div class="rec-panel" id="rec-${d.id}">
            <p class="rec-panel__label">From a hiring perspective</p>
            <p class="rec-panel__text">${d.recommendation}</p>
          </div>` : '';

        return `
          <li class="designer-item">
            <div class="designer-row">
              <a class="row-link" href="${d.url || '#'}" target="_blank" rel="noopener noreferrer">
                <span class="item-index">${String(idx).padStart(2, '0')}</span>
                <div class="item-thumb-wrap">${thumb}</div>
                <div class="item-info">
                  <div class="item-name">${d.name}</div>
                  ${subtitle ? `<div class="item-subtitle">${subtitle}</div>` : ''}
                  <div class="item-tags">${specialtyTags}${labelPills}</div>
                </div>
              </a>
              <div class="item-actions">${recBtn}${xBtn}</div>
              <span class="item-arrow" aria-hidden="true">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                  <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
            ${recPanel}
          </li>`;
      }

      init();
    </script>
  </body>
</html>
