<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Design Review</title>
    <meta name="description" content="A curated index of exceptional product and UI/UX designers." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..600,0&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --paper: oklch(0.975 0.01 85);
        --paper-2: oklch(0.956 0.013 83);
        --paper-3: oklch(0.922 0.019 80);
        --paper-4: oklch(0.884 0.02 78);
        --ink: oklch(0.22 0.02 55);
        --ink-2: oklch(0.37 0.018 55);
        --ink-3: oklch(0.49 0.015 58);
        --wine: oklch(0.49 0.13 24);
        --wine-soft: color-mix(in oklab, var(--wine) 14%, var(--paper));
        --archive: oklch(0.42 0.047 215);
        --archive-soft: color-mix(in oklab, var(--archive) 13%, var(--paper));
        --rule: color-mix(in oklab, var(--ink) 14%, transparent);
        --rule-strong: color-mix(in oklab, var(--ink) 24%, transparent);
        --shadow: 0 18px 48px rgba(56, 42, 25, 0.08);
        --workspace-gap: 56px;
        --sidebar-width: 340px;
        --list-edge-offset: 48px;
        --preview-edge-offset: 4px;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
        --focus-ring: color-mix(in oklab, var(--archive) 82%, black 6%);
      }

      html { font-size: 15px; scroll-behavior: smooth; }

      body {
        min-height: 100vh;
        position: relative;
        color: var(--ink);
        font-family: 'Instrument Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        background:
          linear-gradient(90deg, transparent 0, transparent min(8vw, 72px), color-mix(in oklab, var(--ink) 5%, transparent) min(8vw, 72px), color-mix(in oklab, var(--ink) 5%, transparent) calc(min(8vw, 72px) + 1px), transparent calc(min(8vw, 72px) + 1px)),
          linear-gradient(180deg, rgba(255,255,255,0.58), transparent 24rem),
          radial-gradient(circle at top left, color-mix(in oklab, var(--wine) 7%, transparent), transparent 26rem),
          var(--paper);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        opacity: 0.62;
        background:
          linear-gradient(90deg, transparent 0 67%, color-mix(in oklab, var(--ink) 6%, transparent) 67%, color-mix(in oklab, var(--ink) 6%, transparent) calc(67% + 1px), transparent calc(67% + 1px)),
          linear-gradient(180deg, color-mix(in oklab, var(--ink) 5%, transparent), color-mix(in oklab, var(--ink) 5%, transparent)) top left / 100% 1px no-repeat;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        opacity: 0.018;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 220px 220px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 16px;
        z-index: 200;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--ink);
        color: var(--paper);
        text-decoration: none;
        transform: translateY(-180%);
        transition: transform 150ms var(--ease);
      }

      .skip-link:focus-visible { transform: translateY(0); }

      a:focus-visible,
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 3px;
      }

      .masthead {
        max-width: 1280px;
        margin: 0 auto;
        padding: 72px 56px 46px;
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(240px, 0.55fr);
        gap: 40px;
        align-items: end;
        border-bottom: 1px solid var(--rule-strong);
        position: relative;
      }

      .masthead::after {
        content: 'Archive';
        position: absolute;
        right: 56px;
        top: 22px;
        font-family: 'Fraunces', Georgia, serif;
        font-size: clamp(3.2rem, 8vw, 7rem);
        line-height: 1;
        color: color-mix(in oklab, var(--wine) 10%, transparent);
        letter-spacing: -0.05em;
        pointer-events: none;
      }

      .masthead__flag {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin-bottom: 26px;
      }

      .masthead__title-small {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.71rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ink-2);
        font-weight: 600;
      }

      .masthead__rule-sm {
        flex: 1;
        height: 1px;
        background: var(--rule);
        max-width: 56px;
      }

      .masthead__headline {
        max-width: 11ch;
        font-family: 'Fraunces', Georgia, serif;
        font-size: clamp(3.05rem, 6.4vw, 5.7rem);
        font-weight: 500;
        line-height: 0.92;
        letter-spacing: -0.045em;
        color: var(--ink);
      }

      .masthead__headline em {
        font-style: italic;
        font-weight: 450;
        color: var(--wine);
      }

      .masthead__meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        padding-bottom: 10px;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.72rem;
        color: var(--ink-2);
        letter-spacing: 0.12em;
        text-align: right;
        text-transform: uppercase;
      }

      .masthead__meta strong {
        color: var(--ink);
        font-weight: 600;
      }

      .masthead__meta a {
        color: var(--ink-2);
        text-decoration: none;
        border-bottom: 1px solid var(--rule);
        padding-bottom: 1px;
        transition: color 160ms;
      }

      .masthead__meta a:hover { color: var(--ink); }

      .filter-bar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: color-mix(in oklab, var(--paper) 94%, white 6%);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rule);
        box-shadow: 0 6px 20px rgba(71, 52, 29, 0.04);
      }

      .filter-bar__inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 12px 56px;
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
        grid-template-areas:
          'search cat'
          'search label';
        align-items: start;
        column-gap: 24px;
        row-gap: 10px;
        overflow: visible;
        scrollbar-width: none;
      }

      .filter-bar__inner::-webkit-scrollbar { display: none; }

      .fb-search {
        grid-area: search;
        position: relative;
        min-width: 0;
      }

      .fb-search input {
        background: none;
        border: none;
        outline: none;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.78rem;
        color: var(--ink);
        padding: 15px 18px 15px 34px;
        width: 220px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .fb-search input:focus-visible {
        background: var(--paper-2);
        border-radius: 999px;
      }

      .fb-search input::placeholder { color: var(--ink-3); }

      .fb-search svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        pointer-events: none;
      }

      .fb-sep {
        display: none;
      }

      .fb-group {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0;
        flex-wrap: wrap;
        min-width: 0;
      }

      #cat-chips {
        grid-area: cat;
      }

      .fb-secondary {
        grid-area: label;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        min-width: 0;
      }

      #label-chips {
        flex: 1 1 auto;
      }

      .fb-group--secondary {
        gap: 4px;
      }

      .fb-chip {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.73rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-2);
        background: none;
        border: none;
        cursor: pointer;
        padding: 7px 12px;
        border-radius: 999px;
        transition: all 150ms var(--ease);
        white-space: nowrap;
        font-weight: 500;
      }

      .fb-chip:hover { color: var(--ink); background: var(--paper-2); }

      .fb-chip.is-active {
        color: var(--wine);
        background: var(--wine-soft);
        font-weight: 600;
      }

      .fb-chip--label.is-active {
        color: var(--archive);
        background: var(--archive-soft);
      }

      .fb-chip--hidden {
        display: none;
      }

      .fb-secondary.is-expanded .fb-chip--hidden,
      .fb-chip--label.is-active.fb-chip--hidden {
        display: inline-flex;
      }

      .fb-more {
        flex: 0 0 auto;
        background: none;
        border: none;
        cursor: pointer;
        padding: 7px 0 7px 8px;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-3);
        transition: color 150ms var(--ease);
        white-space: nowrap;
      }

      .fb-more:hover,
      .fb-more:focus-visible {
        color: var(--ink);
      }

      .workspace {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 56px 96px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--sidebar-width);
        gap: var(--workspace-gap);
        align-items: start;
        position: relative;
      }

      .list-col {
        padding-right: var(--list-edge-offset);
        padding-top: 42px;
      }

      .cat-group { margin-bottom: 62px; }

      .cat-header {
        display: grid;
        grid-template-columns: 56px 1fr auto;
        align-items: center;
        gap: 14px;
        padding-bottom: 14px;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--rule-strong);
      }

      .cat-numeral {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        font-size: 1.5rem;
        color: var(--wine);
        font-weight: 500;
      }

      .cat-name {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.78rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--ink-2);
        font-weight: 600;
      }

      .cat-count {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.72rem;
        color: var(--ink-2);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .designer-row {
        display: grid;
        grid-template-columns: 56px 1fr auto;
        gap: 18px;
        align-items: start;
        padding: 22px 14px 22px 0;
        border-bottom: 1px solid color-mix(in oklab, var(--ink) 8%, transparent);
        cursor: default;
        transition: transform 150ms var(--ease);
        margin: 0 -14px;
        position: relative;
        isolation: isolate;
        animation: fadeUp 300ms var(--ease) both;
      }

      .designer-row::before {
        content: '';
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 3px;
        background: var(--wine);
        border-radius: 0 4px 4px 0;
        opacity: 0;
        transition: opacity 150ms var(--ease);
      }

      .designer-row::after {
        content: '';
        position: absolute;
        inset: 4px -10px;
        background: var(--paper-2);
        opacity: 0;
        pointer-events: none;
        transition: opacity 150ms var(--ease), transform 150ms var(--ease);
        z-index: -1;
      }

      .designer-row:hover {
        transform: translateX(2px);
      }

      .designer-row.is-active {
        transform: translateX(4px);
      }

      .designer-row:hover::after,
      .designer-row.is-active::after {
        opacity: 1;
      }

      .designer-row.is-active::before { opacity: 1; }

      .row-num {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.78rem;
        color: var(--ink-2);
        padding-top: 6px;
        text-align: right;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .row-info {
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .row-name {
        font-family: 'Fraunces', Georgia, serif;
        font-size: clamp(1.45rem, 2vw, 1.85rem);
        font-weight: 500;
        line-height: 1.08;
        letter-spacing: -0.025em;
        color: var(--ink);
        margin-bottom: 4px;
      }

      .row-subtitle {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.79rem;
        color: var(--ink-2);
        letter-spacing: 0.12em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .row-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .tag-spec {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.69rem;
        color: var(--ink-2);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        border: 1px solid color-mix(in oklab, var(--ink) 17%, transparent);
        border-radius: 999px;
        padding: 4px 8px;
        white-space: nowrap;
      }

      .tag-label {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.69rem;
        color: var(--archive);
        letter-spacing: 0.12em;
        background: var(--archive-soft);
        border-radius: 999px;
        padding: 4px 8px;
        white-space: nowrap;
        text-transform: uppercase;
      }

      .row-actions {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 8px;
        padding-top: 6px;
        flex-shrink: 0;
      }

      .row-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        width: auto;
        min-width: 52px;
        height: 28px;
        padding: 0 10px;
        color: var(--ink-2);
        text-decoration: none;
        border: 1px solid color-mix(in oklab, var(--ink) 17%, transparent);
        border-radius: 999px;
        transition: all 150ms var(--ease);
        background: color-mix(in oklab, var(--paper) 92%, white 8%);
      }

      .row-link span {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 600;
      }

      .row-link--icon {
        width: 34px;
        min-width: 34px;
        padding: 0;
      }

      .row-link--primary {
        min-width: 84px;
        padding: 0 12px;
        background: var(--wine);
        color: var(--paper);
        border-color: var(--wine);
      }

      .row-link:hover {
        color: var(--ink);
        border-color: var(--rule-strong);
        background: var(--paper-2);
      }

      .row-link.row-link--primary:hover {
        color: var(--paper);
        background: color-mix(in oklab, var(--wine) 86%, black 14%);
        border-color: color-mix(in oklab, var(--wine) 86%, black 14%);
      }

      .why-toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        cursor: pointer;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--wine);
        padding: 0;
        transition: color 150ms;
        white-space: nowrap;
        font-weight: 600;
        margin-top: 14px;
      }

      .why-toggle:hover { color: color-mix(in oklab, var(--wine) 80%, black 20%); }
      .why-toggle.is-open { color: color-mix(in oklab, var(--wine) 80%, black 20%); }

      .why-toggle svg { transition: transform 200ms var(--ease); }
      .why-toggle.is-open svg { transform: rotate(180deg); }

      .why-body {
        display: none;
        margin-top: 12px;
        width: 100%;
        padding: 14px 18px 18px 16px;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.92rem;
        font-weight: 400;
        line-height: 1.68;
        color: var(--ink-2);
        border-top: 1px solid color-mix(in oklab, var(--wine) 16%, transparent);
        border-left: 2px solid color-mix(in oklab, var(--wine) 24%, transparent);
        background: linear-gradient(to bottom, color-mix(in oklab, var(--wine) 4%, transparent), transparent);
        border-radius: 0 0 10px 0;
      }

      .why-body.is-open { display: block; }

      .preview-col {
        position: sticky;
        top: 64px;
        padding: 48px 0 40px 0;
        height: calc(100vh - 49px);
        overflow-y: auto;
        scrollbar-width: none;
        display: flex;
        flex-direction: column;
        position: sticky;
      }

      .preview-col::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: calc((var(--workspace-gap) / -2) - ((var(--list-edge-offset) - var(--preview-edge-offset)) / 2));
        width: 1px;
        background: var(--rule);
        pointer-events: none;
      }

      .preview-col::-webkit-scrollbar { display: none; }

      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding-left: var(--preview-edge-offset);
      }

      .preview-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--ink-2);
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.76rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        gap: 12px;
        opacity: 1;
        transition: opacity 200ms;
        text-align: center;
      }

      .preview-empty svg { opacity: 0.3; }

      .preview-detail {
        display: none;
        flex-direction: column;
        gap: 0;
      }

      .preview-detail.is-visible { display: flex; }

      .preview-shot {
        width: 100%;
        height: 255px;
        border-radius: 18px;
        overflow: hidden;
        background: linear-gradient(145deg, var(--paper-2), var(--paper-3));
        border: 1px solid var(--rule-strong);
        margin-bottom: 24px;
        position: relative;
        box-shadow: var(--shadow);
      }

      .preview-shot-card {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          radial-gradient(circle at 18% 18%, color-mix(in oklab, var(--preview-accent) 32%, transparent), transparent 28%),
          radial-gradient(circle at 82% 26%, color-mix(in oklab, var(--preview-accent) 18%, transparent), transparent 24%),
          linear-gradient(160deg, var(--preview-bg), color-mix(in oklab, var(--preview-bg) 80%, var(--paper) 20%));
      }

      .preview-shot-card::before {
        content: '';
        position: absolute;
        inset: 14px;
        border: 1px solid color-mix(in oklab, var(--ink) 9%, transparent);
        border-radius: 12px;
        pointer-events: none;
      }

      .preview-shot-meta {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .preview-shot-kicker,
      .preview-shot-company {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.66rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: color-mix(in oklab, var(--ink) 62%, white 38%);
      }

      .preview-shot-avatar-wrap {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: center;
        width: min(100%, 112px);
        aspect-ratio: 1;
        border-radius: 999px;
        background: rgba(255,255,255,0.42);
        border: 1px solid rgba(255,255,255,0.38);
        box-shadow: 0 10px 24px rgba(45, 30, 14, 0.12);
        overflow: hidden;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .preview-shot-avatar {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .preview-shot-initials {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-family: 'Fraunces', Georgia, serif;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1;
        color: color-mix(in oklab, var(--ink) 82%, white 18%);
      }

      .preview-shot-footer {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: flex-start;
      }

      .preview-shot-label {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.66rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: color-mix(in oklab, var(--ink) 62%, white 38%);
      }

      .preview-shot-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Fraunces', Georgia, serif;
        font-size: 2.7rem;
        color: var(--ink-2);
        background: var(--paper-2);
      }

      .preview-name {
        font-family: 'Fraunces', Georgia, serif;
        font-size: clamp(1.9rem, 2.6vw, 2.6rem);
        font-weight: 500;
        line-height: 1.02;
        letter-spacing: -0.03em;
        color: var(--ink);
        margin-bottom: 6px;
      }

      .preview-sub {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.72rem;
        color: var(--ink-2);
        letter-spacing: 0.14em;
        margin-bottom: 16px;
        text-transform: uppercase;
      }

      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .preview-actions .row-link {
        width: auto;
        height: 34px;
        padding: 0 12px;
      }


      .preview-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 20px;
      }

      .preview-divider {
        height: 1px;
        background: var(--rule-strong);
        margin: 6px 0 18px;
      }

      .preview-rec-label {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--wine);
        margin-bottom: 12px;
        font-weight: 600;
      }

      .preview-rec-text {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.96rem;
        font-weight: 400;
        line-height: 1.72;
        color: var(--ink-2);
      }

      .preview-no-rec {
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.74rem;
        color: var(--ink-2);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .empty-state {
        padding: 64px 0;
        text-align: center;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.78rem;
        color: var(--ink-2);
        letter-spacing: 0.16em;
        display: none;
        text-transform: uppercase;
      }

      .empty-state.is-visible { display: block; }

      .loading-state {
        padding: 64px 0;
        text-align: center;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.78rem;
        color: var(--ink-2);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .footer {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px 56px;
        border-top: 1px solid var(--rule-strong);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: 'Instrument Sans', sans-serif;
        font-size: 0.72rem;
        color: var(--ink-2);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .footer a {
        color: var(--ink-2);
        text-decoration: none;
        border-bottom: 1px solid color-mix(in oklab, var(--ink) 18%, transparent);
        padding-bottom: 1px;
      }

      .footer a:hover { color: var(--ink); }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }

        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }

        .preview-shot img,
        .designer-row:hover,
        .designer-row.is-active {
          transform: none !important;
        }
      }

      @media (max-width: 980px) {
        .filter-bar__inner {
          padding: 12px 24px;
          grid-template-columns: 1fr;
          grid-template-areas:
            'search'
            'cat'
            'label';
          row-gap: 10px;
          column-gap: 0;
        }

        .fb-search {
          min-width: 0;
        }

        .fb-search input {
          width: 100%;
          min-width: 0;
          padding-right: 14px;
        }

        .fb-sep {
          display: none;
        }

        .fb-group {
          flex-wrap: wrap;
          gap: 6px;
          padding: 0;
        }

        .fb-secondary {
          flex-direction: column;
          align-items: flex-start;
          gap: 6px;
        }

        .fb-more {
          padding-left: 0;
        }
      }

      @media (max-width: 860px) {
        body::before { display: none; }
        .masthead {
          padding: 42px 24px 28px;
          grid-template-columns: 1fr;
        }
        .masthead::after {
          right: 24px;
          top: 18px;
          font-size: clamp(2.8rem, 18vw, 5.2rem);
        }
        .masthead__meta { display: none; }
        .filter-bar__inner {
          padding: 12px 16px;
          row-gap: 8px;
          column-gap: 8px;
        }
        .fb-search input {
          font-size: 0.74rem;
          padding: 13px 14px 13px 34px;
        }
        .fb-chip {
          font-size: 0.68rem;
          letter-spacing: 0.1em;
          padding: 6px 10px;
        }
        .workspace {
          grid-template-columns: 1fr;
          gap: 0;
          padding: 0 24px 60px;
        }
        .preview-col::before { display: none; }
        .list-col {
          padding-right: 0;
        }
        .preview-col { display: none; }
        .footer { padding: 20px 24px; }
        .designer-row { grid-template-columns: 40px 1fr; }
        .row-actions {
          grid-column: 2 / 3;
          justify-content: flex-start;
          padding-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#list-col">Skip to people list</a>

    <!-- MASTHEAD -->
    <header class="masthead">
      <div>
        <div class="masthead__flag">
          <span class="masthead__title-small">The Design Review</span>
          <span class="masthead__rule-sm"></span>
          <span class="masthead__title-small">Issue No. 001</span>
        </div>
        <h1 class="masthead__headline" id="page-title">
          AI product people<br>
          <em>worth following</em>
        </h1>
      </div>
      <div class="masthead__meta">
        <span id="meta-count"><strong>—</strong> entries</span>
        <span>April 2026</span>
        <a href="./index.html">← Portfolio</a>
      </div>
    </header>

    <!-- FILTER BAR -->
    <div class="filter-bar" aria-label="Search and filter designers">
      <div class="filter-bar__inner">
        <div class="fb-search">
          <label class="sr-only" for="search">Search designers</label>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="search" type="search" placeholder="Search…" autocomplete="off" aria-describedby="results-status" />
        </div>
        <div class="fb-sep"></div>
        <div class="fb-group" id="cat-chips" role="group" aria-label="Filter by category">
          <button class="fb-chip is-active" type="button" data-cat="all" aria-pressed="true">All</button>
        </div>
        <div class="fb-secondary" id="secondary-filters">
          <div class="fb-group fb-group--secondary" id="label-chips" role="group" aria-label="Filter by label"></div>
          <button class="fb-more" id="label-toggle" type="button" aria-expanded="false" hidden>More</button>
        </div>
      </div>
    </div>
    <p class="sr-only" id="results-status" role="status" aria-live="polite" aria-atomic="true">Loading designer list.</p>

    <!-- WORKSPACE -->
    <main class="workspace" aria-labelledby="page-title">

      <!-- LIST -->
      <div class="list-col" id="list-col" tabindex="-1">
        <div class="loading-state">Loading index…</div>
      </div>

      <!-- PREVIEW -->
      <aside class="preview-col" aria-label="Designer preview">
        <div class="preview-panel" id="preview-panel">
          <div class="preview-empty" id="preview-empty">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M7 21h10M12 17v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            Hover or focus a name<br>to preview
          </div>
          <div class="preview-detail" id="preview-detail">
            <div class="preview-shot" id="prev-shot">
              <div class="preview-shot-placeholder" id="prev-placeholder">✦</div>
            </div>
            <div class="preview-name" id="prev-name"></div>
            <div class="preview-sub" id="prev-sub"></div>
            <div class="preview-actions" id="prev-actions"></div>
            <div class="preview-tags" id="prev-tags"></div>
            <div class="preview-divider"></div>
            <div class="preview-rec-label">Why follow</div>
            <div id="prev-rec"></div>
          </div>
        </div>
      </aside>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <span id="footer-count"></span>
      <a href="./index.html">← Back to portfolio</a>
    </footer>

    <script>
      const CAT_ORDER = ['Product Designer','Product Manager','Design Engineer','Design Systems','UX Researcher','Brand Designer','Other'];
      const CAT_LABELS = { 'Product Manager': 'PM' };
      const PRIMARY_LABELS = ['AI','Dev Tools','Productivity','Consumer','B2B'];
      const LABEL_ORDER = ['AI','Autonomous','Fintech','Dev Tools','Productivity','B2B','B2C','Enterprise','Consumer','Healthcare','Creator Tools','No-Code','Open Source','Infrastructure','Social'];
      const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

      let all = [], activeCat = 'all', activeLabel = 'all', hoverTimer = null, labelsExpanded = false;

      async function init() {
        const res = await fetch('./designers.json').catch(() => null);
        all = res ? await res.json().catch(() => []) : [];

        document.getElementById('meta-count').innerHTML = `<strong>${all.length}</strong> entries`;
        buildFilters();
        render();
        document.getElementById('search').addEventListener('input', render);
      }

      function setPressedState(selector, key, activeValue) {
        document.querySelectorAll(selector).forEach(button => {
          button.classList.toggle('is-active', button.dataset[key] === activeValue);
          button.setAttribute('aria-pressed', String(button.dataset[key] === activeValue));
        });
      }

      function updateResultsStatus(visibleCount, totalCount) {
        const parts = [];
        if (activeCat !== 'all') parts.push(`category ${activeCat}`);
        if (activeLabel !== 'all') parts.push(`label ${activeLabel}`);

        const query = document.getElementById('search').value.trim();
        if (query) parts.push(`search ${query}`);

        const filtersText = parts.length ? ` matching ${parts.join(', ')}` : '';
        document.getElementById('results-status').textContent = `${visibleCount} of ${totalCount} entries shown${filtersText}.`;
      }

      function buildFilters() {
        const cats = [...new Set(all.map(d => d.category).filter(Boolean))];
        const catEl = document.getElementById('cat-chips');
        catEl.querySelector('[data-cat="all"]').addEventListener('click', () => setCat('all'));
        CAT_ORDER.filter(c => cats.includes(c)).concat(cats.filter(c => !CAT_ORDER.includes(c))).forEach(c => {
          const b = document.createElement('button');
          b.className = 'fb-chip'; b.dataset.cat = c; b.textContent = CAT_LABELS[c] || c; b.type = 'button';
          b.setAttribute('aria-pressed', 'false');
          b.addEventListener('click', () => setCat(c));
          catEl.appendChild(b);
        });

        const allLabels = all.flatMap(d => d.labels || []);
        const counts = {};
        allLabels.forEach(l => counts[l] = (counts[l]||0)+1);
        const sorted = LABEL_ORDER.filter(l => counts[l]).concat(Object.keys(counts).filter(l => !LABEL_ORDER.includes(l)));
        const labelEl = document.getElementById('label-chips');
        const secondaryEl = document.getElementById('secondary-filters');
        const toggle = document.getElementById('label-toggle');
        if (!sorted.length) {
          secondaryEl.style.display = 'none';
        } else {
          sorted.forEach(l => {
            const b = document.createElement('button');
            b.className = 'fb-chip fb-chip--label'; b.dataset.label = l; b.textContent = l; b.type = 'button';
            if (!PRIMARY_LABELS.includes(l)) b.classList.add('fb-chip--hidden');
            b.setAttribute('aria-pressed', 'false');
            b.addEventListener('click', () => setLabel(l));
            labelEl.appendChild(b);
          });

          const hiddenCount = sorted.filter(l => !PRIMARY_LABELS.includes(l)).length;
          if (hiddenCount) {
            toggle.hidden = false;
            toggle.textContent = `More (${hiddenCount})`;
            toggle.addEventListener('click', toggleSecondaryFilters);
          }
        }
      }

      function toggleSecondaryFilters() {
        labelsExpanded = !labelsExpanded;
        const wrapper = document.getElementById('secondary-filters');
        const toggle = document.getElementById('label-toggle');
        const hiddenCount = document.querySelectorAll('#label-chips .fb-chip--hidden').length;
        wrapper.classList.toggle('is-expanded', labelsExpanded);
        toggle.setAttribute('aria-expanded', String(labelsExpanded));
        toggle.textContent = labelsExpanded ? 'Less' : `More (${hiddenCount})`;
      }

      function setCat(c) {
        activeCat = c;
        setPressedState('[data-cat]', 'cat', c);
        render();
      }

      function setLabel(l) {
        activeLabel = activeLabel === l ? 'all' : l;
        setPressedState('[data-label]', 'label', activeLabel);
        render();
      }

      function render() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        let list = all;
        if (activeCat !== 'all') list = list.filter(d => d.category === activeCat);
        if (activeLabel !== 'all') list = list.filter(d => d.labels?.includes(activeLabel));
        if (q) list = list.filter(d =>
          [d.name, d.title, d.company, d.category, ...(d.specialties||[]), ...(d.labels||[])].filter(Boolean).some(v => v.toLowerCase().includes(q))
        );

        const col = document.getElementById('list-col');

        if (!list.length) {
          col.innerHTML = '<div class="empty-state is-visible">No entries match your search.</div>';
          document.getElementById('footer-count').textContent = '0 entries';
          document.getElementById('meta-count').innerHTML = `<strong>0</strong> entries`;
          updateResultsStatus(0, all.length);
          return;
        }

        const groups = {};
        list.forEach(d => { const c = d.category||'Other'; (groups[c]=groups[c]||[]).push(d); });
        const keys = CAT_ORDER.filter(c => groups[c]).concat(Object.keys(groups).filter(c => !CAT_ORDER.includes(c)));

        let globalIdx = 1;
        let catIdx = 0;
        col.innerHTML = keys.map(cat => {
          const items = groups[cat];
          const rows = items.map(d => rowHTML(d, globalIdx++)).join('');
          const roman = ROMAN[catIdx++ % ROMAN.length];
          return `
            <div class="cat-group">
              <div class="cat-header">
                <span class="cat-numeral">${roman}.</span>
                <h2 class="cat-name">${cat}</h2>
                <span class="cat-count">${items.length}</span>
              </div>
              ${rows}
            </div>`;
        }).join('');

        // animate rows staggered
        col.querySelectorAll('.designer-row').forEach((r, i) => {
          r.style.animationDelay = `${i * 30}ms`;
        });

        // hover → preview
        col.querySelectorAll('.designer-row[data-id]').forEach(row => {
          const activateRow = () => {
            clearTimeout(hoverTimer);
            col.querySelectorAll('.designer-row.is-active').forEach(r => r.classList.remove('is-active'));
            row.classList.add('is-active');
            const d = all.find(x => String(x.id) === row.dataset.id);
            if (d) showPreview(d);
          };

          row.addEventListener('mouseenter', activateRow);
          row.addEventListener('focusin', activateRow);
        });

        // why toggles
        col.querySelectorAll('.why-toggle').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const body = document.getElementById('why-' + btn.dataset.id);
            const open = !body.classList.contains('is-open');
            body.classList.toggle('is-open', open);
            body.hidden = !open;
            btn.classList.toggle('is-open', open);
            btn.setAttribute('aria-expanded', String(open));
            col.querySelectorAll('.why-body.is-open').forEach(b => { if (b !== body) b.classList.remove('is-open'); });
            col.querySelectorAll('.why-body').forEach(b => { if (b !== body) b.hidden = !b.classList.contains('is-open'); });
            col.querySelectorAll('.why-toggle.is-open').forEach(b => {
              if (b !== btn) {
                b.classList.remove('is-open');
                b.setAttribute('aria-expanded', 'false');
              }
            });
            col.querySelectorAll('.why-body.is-open').forEach(b => {
              if (b !== body) {
                b.classList.remove('is-open');
                b.hidden = true;
              }
            });
          });
        });

        const total = all.length;
        const label = list.length === total ? `${total} entries` : `${list.length} of ${total} entries`;
        document.getElementById('footer-count').textContent = label;
        document.getElementById('meta-count').innerHTML = `<strong>${list.length === total ? total : list.length + '/' + total}</strong> entries`;
        updateResultsStatus(list.length, total);
      }

      function hashString(value = '') {
        return [...value].reduce((acc, char) => ((acc * 31) + char.charCodeAt(0)) >>> 0, 0);
      }

      function getInitials(name = '') {
        const parts = name.trim().split(/\s+/).filter(Boolean);
        return parts.slice(0, 2).map(part => part[0]?.toUpperCase() || '').join('') || '✦';
      }

      function getPreviewPalette(d) {
        const companyPalettes = {
          OpenAI: { bg: 'oklch(0.93 0.01 120)', accent: 'oklch(0.45 0.03 160)' },
          Anthropic: { bg: 'oklch(0.93 0.025 78)', accent: 'oklch(0.56 0.12 45)' },
          Apple: { bg: 'oklch(0.95 0.006 250)', accent: 'oklch(0.52 0.02 250)' },
          Meta: { bg: 'oklch(0.93 0.03 245)', accent: 'oklch(0.54 0.1 250)' },
          Facebook: { bg: 'oklch(0.93 0.028 245)', accent: 'oklch(0.52 0.1 248)' },
          Google: { bg: 'oklch(0.94 0.022 220)', accent: 'oklch(0.57 0.1 235)' },
          Airbnb: { bg: 'oklch(0.93 0.03 25)', accent: 'oklch(0.61 0.18 24)' },
          Uber: { bg: 'oklch(0.93 0.008 250)', accent: 'oklch(0.28 0.01 250)' },
          Figma: { bg: 'oklch(0.92 0.028 320)', accent: 'oklch(0.58 0.2 28)' },
          Linear: { bg: 'oklch(0.92 0.026 280)', accent: 'oklch(0.57 0.16 285)' },
          Notion: { bg: 'oklch(0.95 0.005 95)', accent: 'oklch(0.3 0.01 95)' },
          GitHub: { bg: 'oklch(0.93 0.018 250)', accent: 'oklch(0.45 0.06 250)' },
          Stripe: { bg: 'oklch(0.93 0.03 290)', accent: 'oklch(0.57 0.16 300)' },
          Vercel: { bg: 'oklch(0.95 0.004 260)', accent: 'oklch(0.28 0.01 260)' },
          Cloudflare: { bg: 'oklch(0.94 0.03 70)', accent: 'oklch(0.63 0.18 52)' },
          Framer: { bg: 'oklch(0.93 0.03 250)', accent: 'oklch(0.48 0.09 250)' },
          Pitch: { bg: 'oklch(0.93 0.03 310)', accent: 'oklch(0.54 0.15 320)' },
          Pinterest: { bg: 'oklch(0.94 0.025 20)', accent: 'oklch(0.55 0.19 25)' },
          Dynamicland: { bg: 'oklch(0.93 0.018 145)', accent: 'oklch(0.45 0.06 175)' },
          'Ink & Switch': { bg: 'oklch(0.93 0.015 200)', accent: 'oklch(0.5 0.05 210)' },
          Elicit: { bg: 'oklch(0.93 0.025 270)', accent: 'oklch(0.55 0.15 285)' }
        };

        const labelPalettes = {
          AI: { bg: 'oklch(0.93 0.02 210)', accent: 'oklch(0.52 0.08 220)' },
          Consumer: { bg: 'oklch(0.93 0.03 28)', accent: 'oklch(0.59 0.17 25)' },
          'Dev Tools': { bg: 'oklch(0.93 0.02 255)', accent: 'oklch(0.44 0.05 248)' },
          Productivity: { bg: 'oklch(0.93 0.024 285)', accent: 'oklch(0.55 0.14 290)' },
          'Creator Tools': { bg: 'oklch(0.93 0.025 325)', accent: 'oklch(0.57 0.14 330)' },
          Infrastructure: { bg: 'oklch(0.93 0.018 240)', accent: 'oklch(0.45 0.04 240)' },
          Social: { bg: 'oklch(0.94 0.022 16)', accent: 'oklch(0.55 0.18 25)' }
        };

        if (companyPalettes[d.company]) return companyPalettes[d.company];
        const labelMatch = (d.labels || []).find(label => labelPalettes[label]);
        if (labelMatch) return labelPalettes[labelMatch];

        const palettes = [
          { bg: 'oklch(0.89 0.03 75)', accent: 'oklch(0.57 0.14 24)' },
          { bg: 'oklch(0.9 0.04 220)', accent: 'oklch(0.5 0.08 230)' },
          { bg: 'oklch(0.91 0.03 145)', accent: 'oklch(0.57 0.11 155)' },
          { bg: 'oklch(0.88 0.05 40)', accent: 'oklch(0.6 0.16 36)' }
        ];

        return palettes[hashString(`${d.name}-${d.company}`) % palettes.length];
      }

      function renderPreviewArt(d) {
        const palette = getPreviewPalette(d);
        const initials = getInitials(d.name);
        const avatar = d.twitter
          ? `<img class="preview-shot-avatar" src="https://unavatar.io/x/${d.twitter}" alt="Profile image of ${d.name}" loading="lazy" onerror="this.parentElement.innerHTML='&lt;div class=&quot;preview-shot-initials&quot; aria-hidden=&quot;true&quot;&gt;${initials}&lt;/div&gt;'" />`
          : `<div class="preview-shot-initials" aria-hidden="true">${initials}</div>`;

        return `
          <div class="preview-shot-card" style="--preview-bg:${palette.bg}; --preview-accent:${palette.accent};">
            <div class="preview-shot-meta">
              <span class="preview-shot-kicker">Profile file</span>
              <span class="preview-shot-company">${d.company || 'Independent'}</span>
            </div>
            <div class="preview-shot-avatar-wrap">
              ${avatar}
            </div>
            <div class="preview-shot-footer">
              <span class="preview-shot-label">${d.category || d.title || 'Design'}</span>
            </div>
          </div>`;
      }

      function rowHTML(d, idx) {
        const subtitle = [d.title, d.company].filter(Boolean).join(' · ');
        const specTags = (d.specialties||[]).map(s => `<span class="tag-spec">${s}</span>`).join('');
        const labelTags = (d.labels||[]).map(l => `<span class="tag-label">${l}</span>`).join('');

        const siteLink = d.url ? `
          <a class="row-link row-link--primary" href="${d.url}" target="_blank" rel="noopener noreferrer" title="Visit site" aria-label="Visit ${d.name}'s site">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Site</span>
          </a>` : '';

        const xLink = d.twitter ? `
          <a class="row-link row-link--icon" href="https://x.com/${d.twitter}" target="_blank" rel="noopener noreferrer" title="@${d.twitter}" aria-label="@${d.twitter} on X">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M12.6 1h2.3L9.8 6.8 16 15h-4.3l-3.7-4.9L3.5 15H1.2l5.5-6.2L0 1h4.4l3.4 4.4L12.6 1zm-.8 12.6h1.3L4.2 2.4H2.8l9 11.2z"/>
            </svg>
          </a>` : '';

        const whyBtn = d.recommendation ? `
          <button class="why-toggle" type="button" data-id="${d.id}" aria-expanded="false" aria-controls="why-${d.id}">
            <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
              <path d="M1 3l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Why follow
          </button>` : '';

        const whyBody = d.recommendation ? `
          <div class="why-body" id="why-${d.id}" role="region" aria-label="Why ${d.name} is worth following" hidden>${d.recommendation}</div>` : '';

        return `
          <div class="designer-row" data-id="${d.id}">
            <div class="row-num">${String(idx).padStart(2,'0')}</div>
            <div class="row-info">
              <div class="row-name">${d.name}</div>
              ${subtitle ? `<div class="row-subtitle">${subtitle}</div>` : ''}
              <div class="row-tags">${labelTags}${specTags}</div>
              ${whyBtn}
              ${whyBody}
            </div>
            <div class="row-actions">
              ${xLink}${siteLink}
            </div>
          </div>`;
      }

      function showPreview(d) {
        const empty = document.getElementById('preview-empty');
        const detail = document.getElementById('preview-detail');
        const shot = document.getElementById('prev-shot');
        empty.style.display = 'none';
        detail.classList.add('is-visible');

        shot.innerHTML = renderPreviewArt(d);

        document.getElementById('prev-name').textContent = d.name;
        document.getElementById('prev-sub').textContent = [d.title, d.company].filter(Boolean).join(' · ');

        const actionsEl = document.getElementById('prev-actions');
        actionsEl.innerHTML = [
          d.url ? `<a class="row-link row-link--primary" href="${d.url}" target="_blank" rel="noopener noreferrer" aria-label="Visit ${d.name}'s site">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Visit site</span>
          </a>` : '',
          d.twitter ? `<a class="row-link row-link--icon" href="https://x.com/${d.twitter}" target="_blank" rel="noopener noreferrer" aria-label="View ${d.name} on X">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M12.6 1h2.3L9.8 6.8 16 15h-4.3l-3.7-4.9L3.5 15H1.2l5.5-6.2L0 1h4.4l3.4 4.4L12.6 1zm-.8 12.6h1.3L4.2 2.4H2.8l9 11.2z"/>
            </svg>
          </a>` : ''
        ].join('');

        const tagsEl = document.getElementById('prev-tags');
        tagsEl.innerHTML = [
          ...(d.labels||[]).map(l => `<span class="tag-label">${l}</span>`),
          ...(d.specialties||[]).map(s => `<span class="tag-spec">${s}</span>`),
        ].join('');

        const recEl = document.getElementById('prev-rec');
        if (d.recommendation) {
          recEl.className = 'preview-rec-text';
          recEl.textContent = d.recommendation;
        } else {
          recEl.className = 'preview-no-rec';
          recEl.textContent = 'No review yet.';
        }
      }

      init();
    </script>
  </body>
</html>
