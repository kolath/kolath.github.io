<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Designers — Curated</title>
    <meta name="description" content="A curated list of exceptional product and UI/UX designers worth following." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0d0d0d;
        --surface: #161616;
        --surface-hover: #1c1c1c;
        --border: rgba(255,255,255,0.06);
        --border-hover: rgba(255,255,255,0.12);
        --text-1: #f0ede8;
        --text-2: #8a8580;
        --text-3: #4a4744;
        --accent: #e8ff5a;
        --accent-dim: rgba(232,255,90,0.08);
        --label-bg: rgba(120,170,255,0.08);
        --label-border: rgba(120,170,255,0.18);
        --label-text: #8ab0e8;
        --rec-bg: rgba(232,255,90,0.05);
        --rec-border: rgba(232,255,90,0.14);
        --ease: cubic-bezier(0.2, 0, 0, 1);
        --card-radius: 14px;
      }

      html { font-size: 15px; scroll-behavior: smooth; }

      body {
        background: var(--bg);
        color: var(--text-1);
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ─── HERO ──────────────────────────────────────────────────────────── */

      .hero {
        max-width: 1120px;
        margin: 0 auto;
        padding: 80px 32px 56px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 32px;
        align-items: end;
        border-bottom: 1px solid var(--border);
      }

      .hero__kicker {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 20px;
      }

      .hero__kicker::before {
        content: '';
        width: 20px;
        height: 1px;
        background: var(--accent);
        opacity: 0.6;
      }

      .hero__title {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: clamp(2.4rem, 5vw, 4rem);
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: -0.01em;
        color: var(--text-1);
      }

      .hero__title em {
        font-style: italic;
        color: var(--text-2);
      }

      .hero__meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        padding-bottom: 6px;
      }

      .hero__stat {
        font-size: 0.72rem;
        color: var(--text-3);
        text-align: right;
      }

      .hero__stat strong {
        color: var(--text-2);
        font-weight: 500;
      }

      /* ─── STICKY FILTER BAR ────────────────────────────────────────────── */

      .filter-bar {
        position: sticky;
        top: 0;
        z-index: 40;
        background: rgba(13,13,13,0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
      }

      .filter-bar__inner {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 32px;
        display: flex;
        align-items: center;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .filter-bar__inner::-webkit-scrollbar { display: none; }

      .filter-divider {
        width: 1px;
        height: 20px;
        background: var(--border);
        flex-shrink: 0;
        margin: 0 4px;
      }

      .search-input-wrap {
        position: relative;
        flex-shrink: 0;
        width: 200px;
      }

      .search-icon {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-3);
        pointer-events: none;
      }

      .search-input {
        width: 100%;
        background: transparent;
        border: none;
        padding: 16px 0 16px 22px;
        color: var(--text-1);
        font-family: inherit;
        font-size: 0.8rem;
        outline: none;
      }

      .search-input::placeholder { color: var(--text-3); }

      .filter-chips {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 10px 0;
        flex-shrink: 0;
      }

      .chip {
        border: none;
        background: transparent;
        border-radius: 100px;
        padding: 5px 12px;
        font-size: 0.75rem;
        font-family: inherit;
        color: var(--text-3);
        cursor: pointer;
        transition: all 160ms var(--ease);
        white-space: nowrap;
      }

      .chip:hover { color: var(--text-2); background: var(--surface); }

      .chip.is-active {
        background: var(--accent);
        color: #111;
        font-weight: 600;
      }

      .chip--label { color: var(--text-3); }
      .chip--label:hover { color: var(--label-text); }
      .chip--label.is-active {
        background: var(--label-bg);
        border: 1px solid var(--label-border);
        color: var(--label-text);
        font-weight: 500;
      }

      /* ─── MAIN GRID ─────────────────────────────────────────────────────── */

      .main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 32px 80px;
      }

      /* category group */
      .cat-group { margin-bottom: 56px; }

      .cat-group__header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .cat-group__name {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-3);
      }

      .cat-group__line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .cat-group__count {
        font-size: 0.68rem;
        color: var(--text-3);
      }

      /* card grid */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      /* ─── CARD ──────────────────────────────────────────────────────────── */

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: border-color 180ms var(--ease), transform 200ms var(--ease), box-shadow 200ms var(--ease);
        position: relative;
      }

      .card:hover {
        border-color: var(--border-hover);
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      }

      /* screenshot */
      .card__thumb {
        width: 100%;
        height: 160px;
        overflow: hidden;
        background: #111;
        border-bottom: 1px solid var(--border);
        position: relative;
      }

      .card__thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
        filter: grayscale(0.15);
        opacity: 0.85;
        transition: transform 400ms var(--ease), opacity 200ms var(--ease), filter 200ms var(--ease);
      }

      .card:hover .card__thumb img {
        transform: scale(1.03);
        opacity: 1;
        filter: grayscale(0);
      }

      .card__thumb-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-3);
        font-size: 1.5rem;
        background: linear-gradient(140deg, #141414, #1a1a1a);
      }

      /* visit overlay on hover */
      .card__visit {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        opacity: 0;
        transition: opacity 180ms var(--ease);
        text-decoration: none;
      }

      .card:hover .card__visit { opacity: 1; }

      .card__visit-label {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 100px;
        padding: 7px 14px;
        font-size: 0.75rem;
        font-weight: 500;
        color: #fff;
      }

      /* body */
      .card__body {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card__top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }

      .card__name {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-1);
        line-height: 1.25;
      }

      .card__subtitle {
        font-size: 0.75rem;
        color: var(--text-2);
        margin-top: 2px;
        line-height: 1.4;
      }

      /* x link */
      .card__x {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        border: 1px solid var(--border);
        color: var(--text-3);
        text-decoration: none;
        flex-shrink: 0;
        transition: all 160ms var(--ease);
      }

      .card__x:hover {
        border-color: var(--border-hover);
        color: var(--text-2);
        background: var(--surface-hover);
      }

      /* tags */
      .card__tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .tag {
        font-size: 0.65rem;
        border-radius: 4px;
        padding: 2px 7px;
        white-space: nowrap;
      }

      .tag--specialty {
        background: rgba(255,255,255,0.05);
        color: #666;
      }

      .tag--label {
        background: var(--label-bg);
        border: 1px solid var(--label-border);
        color: var(--label-text);
        border-radius: 100px;
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding-left: 5px;
      }

      .tag--label::before {
        content: '';
        width: 4px;
        height: 4px;
        background: currentColor;
        border-radius: 50%;
        opacity: 0.5;
        flex-shrink: 0;
      }

      /* why-good */
      .card__footer {
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      .why-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.72rem;
        color: rgba(232,255,90,0.55);
        padding: 0;
        transition: color 160ms var(--ease);
        text-align: left;
      }

      .why-btn:hover { color: rgba(232,255,90,0.85); }

      .why-btn.is-open { color: var(--accent); }

      .why-btn__chevron {
        margin-left: auto;
        flex-shrink: 0;
        transition: transform 200ms var(--ease);
      }

      .why-btn.is-open .why-btn__chevron { transform: rotate(180deg); }

      .why-body {
        display: none;
        padding-top: 10px;
        font-size: 0.78rem;
        line-height: 1.65;
        color: #b8cc80;
        font-style: italic;
      }

      .why-body.is-open { display: block; }

      /* ─── EMPTY ─────────────────────────────────────────────────────────── */

      .empty {
        grid-column: 1/-1;
        padding: 64px 0;
        text-align: center;
        color: var(--text-3);
        font-size: 0.85rem;
        display: none;
      }

      .empty.is-visible { display: block; }

      /* ─── FOOTER ────────────────────────────────────────────────────────── */

      .footer {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 32px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.72rem;
        color: var(--text-3);
      }

      .footer a { color: var(--text-3); text-decoration: none; }
      .footer a:hover { color: var(--text-2); }

      /* ─── RESPONSIVE ────────────────────────────────────────────────────── */

      @media (max-width: 700px) {
        .hero { padding: 48px 20px 36px; grid-template-columns: 1fr; }
        .hero__meta { display: none; }
        .filter-bar__inner { padding: 0 20px; }
        .main { padding: 28px 20px 60px; }
        .card-grid { grid-template-columns: 1fr; }
        .footer { padding: 20px; }
      }

      @media (min-width: 900px) {
        .card-grid { grid-template-columns: repeat(3, 1fr); }
      }
    </style>
  </head>
  <body>

    <!-- HERO -->
    <div class="hero">
      <div>
        <p class="hero__kicker">Curated</p>
        <h1 class="hero__title">Product designers<br><em>worth following</em></h1>
      </div>
      <div class="hero__meta">
        <p class="hero__stat" id="hero-count"><strong>—</strong> designers</p>
        <p class="hero__stat">Updated April 2026</p>
        <p class="hero__stat"><a href="./index.html" style="color:var(--text-3);text-decoration:none;">← Portfolio</a></p>
      </div>
    </div>

    <!-- STICKY FILTER BAR -->
    <div class="filter-bar">
      <div class="filter-bar__inner">

        <div class="search-input-wrap">
          <svg class="search-icon" width="12" height="12" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input class="search-input" id="search" type="search" placeholder="Search…" autocomplete="off" />
        </div>

        <div class="filter-divider"></div>

        <div class="filter-chips" id="cat-chips">
          <button class="chip is-active" data-cat="all">All</button>
        </div>

        <div class="filter-divider" id="label-divider"></div>
        <div class="filter-chips" id="label-chips"></div>

      </div>
    </div>

    <!-- CARD GRID -->
    <main class="main" id="main-content">
      <p style="color:var(--text-3);font-size:0.8rem;padding:40px 0;text-align:center">Loading…</p>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <span id="footer-count"></span>
      <a href="./index.html">← Back to portfolio</a>
    </footer>

    <script>
      const THUMB = 'https://image.thum.io/get/width/600/crop/400/noanimate/';

      const CAT_ORDER = [
        'Product Designer', 'Design Engineer', 'Design Systems',
        'UX Researcher', 'Brand Designer', 'Other',
      ];

      const LABEL_ORDER = [
        'AI', 'Autonomous', 'Fintech', 'Dev Tools', 'Productivity',
        'B2B', 'B2C', 'Enterprise', 'Consumer', 'Healthcare',
        'Creator Tools', 'No-Code', 'Open Source', 'Infrastructure', 'Social',
      ];

      let all = [], activeCat = 'all', activeLabel = 'all';

      async function init() {
        const res = await fetch('./designers.json').catch(() => ({ json: () => [] }));
        all = await res.json().catch(() => []);

        document.getElementById('hero-count').innerHTML =
          `<strong>${all.length}</strong> designers`;

        buildFilters();
        render();
        document.getElementById('search').addEventListener('input', render);
      }

      function buildFilters() {
        // categories
        const cats = [...new Set(all.map(d => d.category).filter(Boolean))];
        const catContainer = document.getElementById('cat-chips');
        catContainer.querySelector('[data-cat="all"]').addEventListener('click', () => setCat('all'));
        CAT_ORDER.filter(c => cats.includes(c)).concat(cats.filter(c => !CAT_ORDER.includes(c)))
          .forEach(cat => {
            const b = document.createElement('button');
            b.className = 'chip'; b.dataset.cat = cat; b.textContent = cat;
            b.addEventListener('click', () => setCat(cat));
            catContainer.appendChild(b);
          });

        // labels
        const allLabels = all.flatMap(d => d.labels || []);
        const labelCounts = {};
        allLabels.forEach(l => labelCounts[l] = (labelCounts[l] || 0) + 1);
        const sorted = LABEL_ORDER.filter(l => labelCounts[l])
          .concat(Object.keys(labelCounts).filter(l => !LABEL_ORDER.includes(l)));

        const labelContainer = document.getElementById('label-chips');
        if (sorted.length === 0) {
          document.getElementById('label-divider').style.display = 'none';
        } else {
          sorted.forEach(label => {
            const b = document.createElement('button');
            b.className = 'chip chip--label'; b.dataset.label = label; b.textContent = label;
            b.addEventListener('click', () => setLabel(label));
            labelContainer.appendChild(b);
          });
        }
      }

      function setCat(c) {
        activeCat = c;
        document.querySelectorAll('[data-cat]').forEach(b =>
          b.classList.toggle('is-active', b.dataset.cat === c));
        render();
      }

      function setLabel(l) {
        activeLabel = activeLabel === l ? 'all' : l;
        document.querySelectorAll('[data-label]').forEach(b =>
          b.classList.toggle('is-active', b.dataset.label === activeLabel));
        render();
      }

      function render() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        let list = all;

        if (activeCat !== 'all') list = list.filter(d => d.category === activeCat);
        if (activeLabel !== 'all') list = list.filter(d => d.labels?.includes(activeLabel));
        if (q) list = list.filter(d =>
          [d.name, d.title, d.company, d.category, ...(d.specialties || []), ...(d.labels || [])]
            .filter(Boolean).some(v => v.toLowerCase().includes(q))
        );

        const container = document.getElementById('main-content');

        if (list.length === 0) {
          container.innerHTML = '<div class="empty is-visible">No designers match your search.</div>';
          document.getElementById('footer-count').textContent = '0 designers';
          return;
        }

        // group by category
        const groups = {};
        list.forEach(d => {
          const cat = d.category || 'Other';
          (groups[cat] = groups[cat] || []).push(d);
        });

        const keys = CAT_ORDER.filter(c => groups[c])
          .concat(Object.keys(groups).filter(c => !CAT_ORDER.includes(c)));

        let idx = 1;
        container.innerHTML = keys.map(cat => `
          <div class="cat-group">
            <div class="cat-group__header">
              <span class="cat-group__name">${cat}</span>
              <span class="cat-group__line"></span>
              <span class="cat-group__count">${groups[cat].length}</span>
            </div>
            <div class="card-grid">
              ${groups[cat].map(d => cardHTML(d, idx++)).join('')}
            </div>
          </div>`).join('');

        // bind why buttons
        container.querySelectorAll('.why-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const body = document.getElementById('why-' + btn.dataset.id);
            const open = body.classList.toggle('is-open');
            btn.classList.toggle('is-open', open);
            if (open) {
              // close others
              container.querySelectorAll('.why-body.is-open').forEach(b => {
                if (b !== body) { b.classList.remove('is-open'); }
              });
              container.querySelectorAll('.why-btn.is-open').forEach(b => {
                if (b !== btn) b.classList.remove('is-open');
              });
            }
          });
        });

        const total = all.length;
        document.getElementById('footer-count').textContent =
          list.length === total ? `${total} designers` : `${list.length} of ${total} designers`;
        document.getElementById('hero-count').innerHTML =
          `<strong>${list.length === total ? total : list.length + ' / ' + total}</strong> designers`;
      }

      function cardHTML(d, idx) {
        const thumb = d.url
          ? `<img src="${THUMB}${d.url}" alt="${d.name}" loading="lazy"
               onerror="this.outerHTML='<div class=card__thumb-placeholder>✦</div>'" />`
          : `<div class="card__thumb-placeholder">✦</div>`;

        const subtitle = [d.title, d.company].filter(Boolean).join(' · ');

        const specialtyTags = (d.specialties || [])
          .map(s => `<span class="tag tag--specialty">${s}</span>`).join('');
        const labelPills = (d.labels || [])
          .map(l => `<span class="tag tag--label">${l}</span>`).join('');

        const xBtn = d.twitter
          ? `<a class="card__x" href="https://x.com/${d.twitter}" target="_blank" rel="noopener noreferrer"
               title="@${d.twitter}" aria-label="@${d.twitter} on X">
               <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
                 <path d="M12.6 1h2.3L9.8 6.8 16 15h-4.3l-3.7-4.9L3.5 15H1.2l5.5-6.2L0 1h4.4l3.4 4.4L12.6 1zm-.8 12.6h1.3L4.2 2.4H2.8l9 11.2z"/>
               </svg>
             </a>` : '';

        const whySection = d.recommendation ? `
          <div class="card__footer">
            <button class="why-btn" data-id="${d.id}">
              <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M6 4v3M6 8.5v.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              Why this portfolio stands out
              <svg class="why-btn__chevron" width="10" height="10" viewBox="0 0 12 12" fill="none">
                <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="why-body" id="why-${d.id}">${d.recommendation}</div>
          </div>` : '';

        return `
          <article class="card">
            <div class="card__thumb">
              ${thumb}
              <a class="card__visit" href="${d.url || '#'}" target="_blank" rel="noopener noreferrer">
                <span class="card__visit-label">
                  Visit site
                  <svg width="10" height="10" viewBox="0 0 16 16" fill="none">
                    <path d="M4 12L12 4M12 4H6M12 4v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </a>
            </div>
            <div class="card__body">
              <div class="card__top">
                <div>
                  <div class="card__name">${d.name}</div>
                  ${subtitle ? `<div class="card__subtitle">${subtitle}</div>` : ''}
                </div>
                ${xBtn}
              </div>
              ${(specialtyTags || labelPills) ? `<div class="card__tags">${labelPills}${specialtyTags}</div>` : ''}
              ${whySection}
            </div>
          </article>`;
      }

      init();
    </script>
  </body>
</html>
