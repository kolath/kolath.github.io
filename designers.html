<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Design Review</title>
    <meta name="description" content="A curated index of exceptional product and UI/UX designers." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Fragment+Mono&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --paper:    #faf7f1;
        --paper-2:  #f2ede4;
        --paper-3:  #e8e2d8;
        --ink:      #1c1814;
        --ink-2:    #6b6258;
        --ink-3:    #a89e94;
        --rust:     #c04828;
        --rust-dim: rgba(192,72,40,0.07);
        --cobalt:   #2244a8;
        --cobalt-dim: rgba(34,68,168,0.07);
        --rule:     rgba(28,24,20,0.1);
        --ease:     cubic-bezier(0.25, 0, 0, 1);
      }

      html { font-size: 15px; scroll-behavior: smooth; }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: 'Cormorant Garamond', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        /* dot grid */
        background-image: radial-gradient(circle, rgba(28,24,20,0.07) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      /* grain overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 180px 180px;
      }

      /* ── MASTHEAD ──────────────────────────────────────────────────── */

      .masthead {
        max-width: 1200px;
        margin: 0 auto;
        padding: 56px 48px 40px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 24px;
        align-items: end;
        border-bottom: 1px solid var(--rule);
        position: relative;
      }

      .masthead__flag {
        display: flex;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 20px;
      }

      .masthead__title-small {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.68rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      .masthead__rule-sm {
        flex: 1;
        height: 1px;
        background: var(--rule);
        max-width: 48px;
      }

      .masthead__headline {
        font-size: clamp(3rem, 6.5vw, 5.5rem);
        font-weight: 300;
        line-height: 1.0;
        letter-spacing: -0.01em;
        color: var(--ink);
      }

      .masthead__headline em {
        font-style: italic;
        font-weight: 300;
        color: var(--rust);
      }

      .masthead__meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        padding-bottom: 8px;
        font-family: 'Fragment Mono', monospace;
        font-size: 0.65rem;
        color: var(--ink-3);
        letter-spacing: 0.06em;
        text-align: right;
      }

      .masthead__meta strong {
        color: var(--ink-2);
        font-weight: 400;
      }

      .masthead__meta a {
        color: var(--ink-3);
        text-decoration: none;
        border-bottom: 1px solid var(--rule);
        padding-bottom: 1px;
        transition: color 160ms;
      }

      .masthead__meta a:hover { color: var(--ink); }

      /* ── FILTER BAR ────────────────────────────────────────────────── */

      .filter-bar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(250,247,241,0.94);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rule);
      }

      .filter-bar__inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 48px;
        display: flex;
        align-items: center;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .filter-bar__inner::-webkit-scrollbar { display: none; }

      /* search */
      .fb-search {
        position: relative;
        flex-shrink: 0;
      }

      .fb-search input {
        background: none;
        border: none;
        outline: none;
        font-family: 'Fragment Mono', monospace;
        font-size: 0.7rem;
        color: var(--ink);
        padding: 14px 16px 14px 32px;
        width: 180px;
        letter-spacing: 0.04em;
      }

      .fb-search input::placeholder { color: var(--ink-3); }

      .fb-search svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        pointer-events: none;
      }

      .fb-sep {
        width: 1px;
        height: 16px;
        background: var(--rule);
        flex-shrink: 0;
        margin: 0 2px;
      }

      /* filter groups */
      .fb-group {
        display: flex;
        align-items: center;
        gap: 1px;
        padding: 8px 0;
      }

      .fb-chip {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-3);
        background: none;
        border: none;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 3px;
        transition: all 150ms var(--ease);
        white-space: nowrap;
      }

      .fb-chip:hover { color: var(--ink); background: var(--paper-2); }

      .fb-chip.is-active {
        color: var(--rust);
        background: var(--rust-dim);
        font-weight: 400;
      }

      .fb-chip--label.is-active {
        color: var(--cobalt);
        background: var(--cobalt-dim);
      }

      /* ── LAYOUT: list + preview ────────────────────────────────────── */

      .workspace {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 48px 80px;
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 0;
        align-items: start;
      }

      /* ── LEFT: designer list ───────────────────────────────────────── */

      .list-col {
        border-right: 1px solid var(--rule);
        padding-right: 48px;
        padding-top: 40px;
      }

      /* category group */
      .cat-group { margin-bottom: 48px; }

      .cat-header {
        display: grid;
        grid-template-columns: 40px 1fr auto;
        align-items: baseline;
        gap: 12px;
        padding-bottom: 12px;
        margin-bottom: 2px;
        border-bottom: 1px solid var(--rule);
      }

      .cat-numeral {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 1.1rem;
        color: var(--ink-3);
        font-weight: 300;
      }

      .cat-name {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      .cat-count {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.6rem;
        color: var(--ink-3);
      }

      /* designer row */
      .designer-row {
        display: grid;
        grid-template-columns: 48px 1fr auto;
        gap: 16px;
        align-items: start;
        padding: 16px 12px 16px 0;
        border-bottom: 1px solid rgba(28,24,20,0.06);
        cursor: default;
        transition: background 150ms var(--ease);
        border-radius: 4px;
        margin: 0 -12px;
        position: relative;
      }

      .designer-row::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--rust);
        border-radius: 0 2px 2px 0;
        opacity: 0;
        transition: opacity 150ms var(--ease);
      }

      .designer-row:hover { background: rgba(28,24,20,0.025); }
      .designer-row.is-active { background: rgba(28,24,20,0.03); }
      .designer-row.is-active::before { opacity: 1; }

      .row-num {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.72rem;
        color: var(--ink-3);
        padding-top: 3px;
        text-align: right;
        letter-spacing: 0.04em;
      }

      .row-info { min-width: 0; }

      .row-name {
        font-size: 1.25rem;
        font-weight: 400;
        line-height: 1.2;
        color: var(--ink);
        margin-bottom: 2px;
      }

      .row-subtitle {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        color: var(--ink-2);
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }

      .row-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .tag-spec {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.58rem;
        color: var(--ink-3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--rule);
        border-radius: 2px;
        padding: 1px 5px;
        white-space: nowrap;
      }

      .tag-label {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.58rem;
        color: var(--cobalt);
        letter-spacing: 0.06em;
        background: var(--cobalt-dim);
        border-radius: 2px;
        padding: 1px 6px;
        white-space: nowrap;
      }

      /* row actions */
      .row-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        padding-top: 4px;
        flex-shrink: 0;
      }

      .row-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        color: var(--ink-3);
        text-decoration: none;
        border: 1px solid var(--rule);
        border-radius: 4px;
        transition: all 150ms var(--ease);
        background: var(--paper);
      }

      .row-link:hover {
        color: var(--ink);
        border-color: var(--rule);
        background: var(--paper-2);
      }

      /* why-good inline */
      .why-toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        cursor: pointer;
        font-family: 'Fragment Mono', monospace;
        font-size: 0.58rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(192,72,40,0.45);
        padding: 0;
        transition: color 150ms;
        white-space: nowrap;
      }

      .why-toggle:hover { color: var(--rust); }
      .why-toggle.is-open { color: var(--rust); }

      .why-toggle svg {
        transition: transform 200ms var(--ease);
      }

      .why-toggle.is-open svg { transform: rotate(180deg); }

      .why-body {
        display: none;
        grid-column: 2 / 3;
        margin-top: 0;
        padding: 10px 12px 14px 0;
        font-size: 0.95rem;
        font-style: italic;
        font-weight: 300;
        line-height: 1.7;
        color: var(--ink-2);
        border-top: 1px solid rgba(192,72,40,0.12);
        background: linear-gradient(to bottom, rgba(192,72,40,0.02), transparent);
        border-radius: 0 0 4px 4px;
      }

      .why-body.is-open { display: block; }

      /* ── RIGHT: sticky preview ─────────────────────────────────────── */

      .preview-col {
        position: sticky;
        top: 49px;
        padding: 40px 0 40px 40px;
        height: calc(100vh - 49px);
        overflow-y: auto;
        scrollbar-width: none;
        display: flex;
        flex-direction: column;
      }

      .preview-col::-webkit-scrollbar { display: none; }

      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .preview-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--ink-3);
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        gap: 12px;
        opacity: 1;
        transition: opacity 200ms;
        text-align: center;
      }

      .preview-empty svg { opacity: 0.3; }

      .preview-detail {
        display: none;
        flex-direction: column;
        gap: 0;
      }

      .preview-detail.is-visible { display: flex; }

      .preview-shot {
        width: 100%;
        aspect-ratio: 4/3;
        border-radius: 8px;
        overflow: hidden;
        background: var(--paper-2);
        border: 1px solid var(--rule);
        margin-bottom: 20px;
        position: relative;
      }

      .preview-shot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
        transition: transform 400ms var(--ease);
      }

      .preview-shot:hover img { transform: scale(1.04); }

      .preview-shot-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--ink-3);
        background: var(--paper-2);
      }

      .preview-visit {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
        padding: 12px;
        background: linear-gradient(to top, rgba(28,24,20,0.4) 0%, transparent 50%);
        opacity: 0;
        transition: opacity 200ms var(--ease);
        text-decoration: none;
      }

      .preview-shot:hover .preview-visit { opacity: 1; }

      .preview-visit span {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(250,247,241,0.9);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .preview-name {
        font-size: 1.75rem;
        font-weight: 400;
        line-height: 1.15;
        color: var(--ink);
        margin-bottom: 4px;
      }

      .preview-sub {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        color: var(--ink-2);
        letter-spacing: 0.04em;
        margin-bottom: 14px;
      }

      .preview-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 20px;
      }

      .preview-divider {
        height: 1px;
        background: var(--rule);
        margin: 4px 0 16px;
      }

      .preview-rec-label {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.58rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--rust);
        opacity: 0.6;
        margin-bottom: 10px;
      }

      .preview-rec-text {
        font-size: 0.95rem;
        font-style: italic;
        font-weight: 300;
        line-height: 1.75;
        color: var(--ink-2);
      }

      .preview-no-rec {
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        color: var(--ink-3);
        letter-spacing: 0.06em;
      }

      /* ── EMPTY / LOADING ───────────────────────────────────────────── */

      .empty-state {
        padding: 64px 0;
        text-align: center;
        font-family: 'Fragment Mono', monospace;
        font-size: 0.7rem;
        color: var(--ink-3);
        letter-spacing: 0.08em;
        display: none;
      }

      .empty-state.is-visible { display: block; }

      .loading-state {
        padding: 64px 0;
        text-align: center;
        font-family: 'Fragment Mono', monospace;
        font-size: 0.7rem;
        color: var(--ink-3);
        letter-spacing: 0.08em;
      }

      /* ── FOOTER ────────────────────────────────────────────────────── */

      .footer {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 48px;
        border-top: 1px solid var(--rule);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: 'Fragment Mono', monospace;
        font-size: 0.62rem;
        color: var(--ink-3);
        letter-spacing: 0.06em;
      }

      .footer a { color: var(--ink-3); text-decoration: none; border-bottom: 1px solid var(--rule); padding-bottom: 1px; }
      .footer a:hover { color: var(--ink); }

      /* ── ENTRANCE ANIMATIONS ───────────────────────────────────────── */

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .designer-row {
        animation: fadeUp 300ms var(--ease) both;
      }

      /* ── RESPONSIVE ────────────────────────────────────────────────── */

      @media (max-width: 860px) {
        .masthead { padding: 40px 24px 28px; grid-template-columns: 1fr; }
        .masthead__meta { display: none; }
        .filter-bar__inner { padding: 0 24px; }
        .workspace { grid-template-columns: 1fr; padding: 0 24px 60px; }
        .list-col { border-right: none; padding-right: 0; }
        .preview-col { display: none; }
        .footer { padding: 20px 24px; }
      }
    </style>
  </head>
  <body>

    <!-- MASTHEAD -->
    <header class="masthead">
      <div>
        <div class="masthead__flag">
          <span class="masthead__title-small">The Design Review</span>
          <span class="masthead__rule-sm"></span>
          <span class="masthead__title-small">Issue No. 001</span>
        </div>
        <h1 class="masthead__headline">
          Product designers<br>
          <em>worth following</em>
        </h1>
      </div>
      <div class="masthead__meta">
        <span id="meta-count"><strong>—</strong> entries</span>
        <span>April 2026</span>
        <a href="./index.html">← Portfolio</a>
      </div>
    </header>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="filter-bar__inner">
        <div class="fb-search">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="search" type="search" placeholder="Search…" autocomplete="off" />
        </div>
        <div class="fb-sep"></div>
        <div class="fb-group" id="cat-chips">
          <button class="fb-chip is-active" data-cat="all">All</button>
        </div>
        <div class="fb-sep" id="label-sep"></div>
        <div class="fb-group" id="label-chips"></div>
      </div>
    </div>

    <!-- WORKSPACE -->
    <div class="workspace">

      <!-- LIST -->
      <div class="list-col" id="list-col">
        <div class="loading-state">Loading index…</div>
      </div>

      <!-- PREVIEW -->
      <aside class="preview-col">
        <div class="preview-panel" id="preview-panel">
          <div class="preview-empty" id="preview-empty">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M7 21h10M12 17v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            Hover a name<br>to preview
          </div>
          <div class="preview-detail" id="preview-detail">
            <div class="preview-shot" id="prev-shot">
              <div class="preview-shot-placeholder" id="prev-placeholder">✦</div>
              <a class="preview-visit" id="prev-visit" href="#" target="_blank" rel="noopener noreferrer">
                <span>Visit site <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              </a>
            </div>
            <div class="preview-name" id="prev-name"></div>
            <div class="preview-sub" id="prev-sub"></div>
            <div class="preview-tags" id="prev-tags"></div>
            <div class="preview-divider"></div>
            <div class="preview-rec-label">From a hiring perspective</div>
            <div id="prev-rec"></div>
          </div>
        </div>
      </aside>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <span id="footer-count"></span>
      <a href="./index.html">← Back to portfolio</a>
    </footer>

    <script>
      const THUMB = 'https://image.thum.io/get/width/600/crop/450/noanimate/';

      const CAT_ORDER = ['Product Designer','Design Engineer','Design Systems','UX Researcher','Brand Designer','Other'];
      const LABEL_ORDER = ['AI','Autonomous','Fintech','Dev Tools','Productivity','B2B','B2C','Enterprise','Consumer','Healthcare','Creator Tools','No-Code','Open Source','Infrastructure','Social'];
      const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

      let all = [], activeCat = 'all', activeLabel = 'all', hoverTimer = null;

      async function init() {
        const res = await fetch('./designers.json').catch(() => null);
        all = res ? await res.json().catch(() => []) : [];

        document.getElementById('meta-count').innerHTML = `<strong>${all.length}</strong> entries`;
        buildFilters();
        render();
        document.getElementById('search').addEventListener('input', render);
      }

      function buildFilters() {
        const cats = [...new Set(all.map(d => d.category).filter(Boolean))];
        const catEl = document.getElementById('cat-chips');
        catEl.querySelector('[data-cat="all"]').addEventListener('click', () => setCat('all'));
        CAT_ORDER.filter(c => cats.includes(c)).concat(cats.filter(c => !CAT_ORDER.includes(c))).forEach(c => {
          const b = document.createElement('button');
          b.className = 'fb-chip'; b.dataset.cat = c; b.textContent = c;
          b.addEventListener('click', () => setCat(c));
          catEl.appendChild(b);
        });

        const allLabels = all.flatMap(d => d.labels || []);
        const counts = {};
        allLabels.forEach(l => counts[l] = (counts[l]||0)+1);
        const sorted = LABEL_ORDER.filter(l => counts[l]).concat(Object.keys(counts).filter(l => !LABEL_ORDER.includes(l)));
        const labelEl = document.getElementById('label-chips');
        if (!sorted.length) {
          document.getElementById('label-sep').style.display = 'none';
        } else {
          sorted.forEach(l => {
            const b = document.createElement('button');
            b.className = 'fb-chip fb-chip--label'; b.dataset.label = l; b.textContent = l;
            b.addEventListener('click', () => setLabel(l));
            labelEl.appendChild(b);
          });
        }
      }

      function setCat(c) {
        activeCat = c;
        document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('is-active', b.dataset.cat === c));
        render();
      }

      function setLabel(l) {
        activeLabel = activeLabel === l ? 'all' : l;
        document.querySelectorAll('[data-label]').forEach(b => b.classList.toggle('is-active', b.dataset.label === activeLabel));
        render();
      }

      function render() {
        const q = document.getElementById('search').value.toLowerCase().trim();
        let list = all;
        if (activeCat !== 'all') list = list.filter(d => d.category === activeCat);
        if (activeLabel !== 'all') list = list.filter(d => d.labels?.includes(activeLabel));
        if (q) list = list.filter(d =>
          [d.name, d.title, d.company, d.category, ...(d.specialties||[]), ...(d.labels||[])].filter(Boolean).some(v => v.toLowerCase().includes(q))
        );

        const col = document.getElementById('list-col');

        if (!list.length) {
          col.innerHTML = '<div class="empty-state is-visible">No entries match your search.</div>';
          document.getElementById('footer-count').textContent = '0 entries';
          document.getElementById('meta-count').innerHTML = `<strong>0</strong> entries`;
          return;
        }

        const groups = {};
        list.forEach(d => { const c = d.category||'Other'; (groups[c]=groups[c]||[]).push(d); });
        const keys = CAT_ORDER.filter(c => groups[c]).concat(Object.keys(groups).filter(c => !CAT_ORDER.includes(c)));

        let globalIdx = 1;
        let catIdx = 0;
        col.innerHTML = keys.map(cat => {
          const items = groups[cat];
          const rows = items.map(d => rowHTML(d, globalIdx++)).join('');
          const roman = ROMAN[catIdx++ % ROMAN.length];
          return `
            <div class="cat-group">
              <div class="cat-header">
                <span class="cat-numeral">${roman}.</span>
                <span class="cat-name">${cat}</span>
                <span class="cat-count">${items.length}</span>
              </div>
              ${rows}
            </div>`;
        }).join('');

        // animate rows staggered
        col.querySelectorAll('.designer-row').forEach((r, i) => {
          r.style.animationDelay = `${i * 30}ms`;
        });

        // hover → preview
        col.querySelectorAll('.designer-row[data-id]').forEach(row => {
          row.addEventListener('mouseenter', () => {
            clearTimeout(hoverTimer);
            col.querySelectorAll('.designer-row.is-active').forEach(r => r.classList.remove('is-active'));
            row.classList.add('is-active');
            const d = all.find(x => String(x.id) === row.dataset.id);
            if (d) showPreview(d);
          });
        });

        // why toggles
        col.querySelectorAll('.why-toggle').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const body = document.getElementById('why-' + btn.dataset.id);
            const open = body.classList.toggle('is-open');
            btn.classList.toggle('is-open', open);
            col.querySelectorAll('.why-body.is-open').forEach(b => { if (b !== body) b.classList.remove('is-open'); });
            col.querySelectorAll('.why-toggle.is-open').forEach(b => { if (b !== btn) b.classList.remove('is-open'); });
          });
        });

        const total = all.length;
        const label = list.length === total ? `${total} entries` : `${list.length} of ${total} entries`;
        document.getElementById('footer-count').textContent = label;
        document.getElementById('meta-count').innerHTML = `<strong>${list.length === total ? total : list.length + '/' + total}</strong> entries`;
      }

      function rowHTML(d, idx) {
        const subtitle = [d.title, d.company].filter(Boolean).join(' · ');
        const specTags = (d.specialties||[]).map(s => `<span class="tag-spec">${s}</span>`).join('');
        const labelTags = (d.labels||[]).map(l => `<span class="tag-label">${l}</span>`).join('');

        const siteLink = d.url ? `
          <a class="row-link" href="${d.url}" target="_blank" rel="noopener noreferrer" title="Visit portfolio" aria-label="Visit ${d.name}'s portfolio">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>` : '';

        const xLink = d.twitter ? `
          <a class="row-link" href="https://x.com/${d.twitter}" target="_blank" rel="noopener noreferrer" title="@${d.twitter}" aria-label="@${d.twitter} on X">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M12.6 1h2.3L9.8 6.8 16 15h-4.3l-3.7-4.9L3.5 15H1.2l5.5-6.2L0 1h4.4l3.4 4.4L12.6 1zm-.8 12.6h1.3L4.2 2.4H2.8l9 11.2z"/>
            </svg>
          </a>` : '';

        const whyBtn = d.recommendation ? `
          <button class="why-toggle" data-id="${d.id}">
            <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
              <path d="M1 3l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Why good
          </button>` : '';

        const whyBody = d.recommendation ? `
          <div class="why-body" id="why-${d.id}">${d.recommendation}</div>` : '';

        return `
          <div class="designer-row" data-id="${d.id}">
            <div class="row-num">${String(idx).padStart(2,'0')}</div>
            <div class="row-info">
              <div class="row-name">${d.name}</div>
              ${subtitle ? `<div class="row-subtitle">${subtitle}</div>` : ''}
              <div class="row-tags">${labelTags}${specTags}</div>
            </div>
            <div class="row-actions">
              ${siteLink}${xLink}${whyBtn}
            </div>
            ${whyBody}
          </div>`;
      }

      function showPreview(d) {
        const empty = document.getElementById('preview-empty');
        const detail = document.getElementById('preview-detail');
        const shot = document.getElementById('prev-shot');
        const placeholder = document.getElementById('prev-placeholder');
        const visit = document.getElementById('prev-visit');

        empty.style.display = 'none';
        detail.classList.add('is-visible');

        // screenshot
        if (d.url) {
          shot.innerHTML = `
            <img src="${THUMB}${d.url}" alt="${d.name}" loading="lazy"
                 onerror="this.outerHTML='<div class=preview-shot-placeholder>✦</div>'" />
            <a class="preview-visit" href="${d.url}" target="_blank" rel="noopener noreferrer">
              <span>Visit site <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H5M10 2v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            </a>`;
        } else {
          shot.innerHTML = `<div class="preview-shot-placeholder">✦</div>`;
        }

        document.getElementById('prev-name').textContent = d.name;
        document.getElementById('prev-sub').textContent = [d.title, d.company].filter(Boolean).join(' · ');

        const tagsEl = document.getElementById('prev-tags');
        tagsEl.innerHTML = [
          ...(d.labels||[]).map(l => `<span class="tag-label">${l}</span>`),
          ...(d.specialties||[]).map(s => `<span class="tag-spec">${s}</span>`),
        ].join('');

        const recEl = document.getElementById('prev-rec');
        if (d.recommendation) {
          recEl.className = 'preview-rec-text';
          recEl.textContent = d.recommendation;
        } else {
          recEl.className = 'preview-no-rec';
          recEl.textContent = 'No review yet.';
        }
      }

      init();
    </script>
  </body>
</html>
