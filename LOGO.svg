<svg width="117" height="22" viewBox="0 0 117 22" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title">
<title id="logo-title">Gem logo</title>
<style>
  :root {
    --logo-duration: 280ms;
    --logo-delay-step: 42ms;
    --logo-ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  .logo-segment {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    will-change: transform, opacity;
    animation: logo-enter var(--logo-duration) var(--logo-ease) forwards;
  }

  .logo-segment--1 {
    animation-delay: calc(var(--logo-delay-step) * 0);
  }

  .logo-segment--2 {
    animation-delay: calc(var(--logo-delay-step) * 1);
  }

  .logo-segment--3 {
    animation-delay: calc(var(--logo-delay-step) * 2);
  }

  .logo-segment--4 {
    animation-delay: calc(var(--logo-delay-step) * 3);
  }

  .logo-segment--5 {
    animation-delay: calc(var(--logo-delay-step) * 4);
  }

  .logo-segment--6 {
    animation-delay: calc(var(--logo-delay-step) * 5);
  }

  @keyframes logo-enter {
    0% {
      opacity: 0;
      transform: translateY(3px) scale(0.985);
    }

    70% {
      opacity: 1;
      transform: translateY(0) scale(1.01);
    }

    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-segment {
      opacity: 1;
      transform: none;
      animation: none;
    }
  }
</style>
